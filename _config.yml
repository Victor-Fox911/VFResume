# Site settings
title: Victor Fontana
email: toriefontana911@gmail.com
url: https://victor-fox911.github.io/VFResume/
description: "Portfolio for Victor Fontanna, displaying their achievements and skills."
keywords: "IT, Information, Technology, Resume, Portfolio"
skills: "Detail-oriented IT student with a passion for technology and problem-solving."
meta_author: Fontana Victoria

# Google webmaster tools
google_verify:

# https://ssl.bing.com/webmaster/configure/verify/ownership Option 2 content= goes here
bing_verify:

# Contact form:
# - static : pass through formspree.io to validate email sending
# - disqus : replace contact form by disqus thread
# - comment the line below if you want to stick with the default PHP contact form
contact: static

# If you use disqus you need disqus shortname
# https://help.disqus.com/customer/portal/articles/466208
disqus_shortname: myshortname

# Color settings (hex-codes without the leading hash-tag)
color:
  primary: 317dc4 #80B3FF
  primary-rgb: "49,125,196" #"128,179,255"
  secondary: 11375c #FD6E8A
  secondary-dark: 233140 #A2122F

# Footer settings
footer:
  copyright: Victor Fontana
  location: Location
  social: Around the Web
  credits: Credits

# Social networks usernames (many more available: google-plus, flickr, dribbble, pinterest, instagram, tumblr, linkedin, etc.)
social:
  - title: github
    url: https://github.com/Victor-Fox911
  - title: linkedin
    url: https://www.linkedin.com/in/victoria-fontana-563042222/

# Postal address (add as many lines as necessary)
address:
  - line: Orlando, FL
  - line: 32826

# Credits content
credits: 'Freelancer is a free to use, open source Bootstrap theme created by <a href="http://startbootstrap.com">Start Bootstrap</a>.'

# Build settings
markdown: kramdown
permalink: pretty

#for posts
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: ""
